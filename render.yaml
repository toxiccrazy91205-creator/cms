services:
  - type: web
    name: cms-render
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    # Render maps a single port to the public web URL. 
    # By default, we expose 8888, which is the CMS Admin Panel.
    # If you want to expose the Contestant panel instead, change this to 8889.
    envVars:
      - key: PORT
        value: "8889"
